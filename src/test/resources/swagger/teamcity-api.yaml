components:
  schemas:
    Build:
      type: object
      properties:
        id:
          type: string
        buildTypeId:
          type: string
        state:
          type: string
          enum: [queued, running, finished, canceled]
        status:
          type: string
          enum: [SUCCESS, FAILURE, UNKNOWN]
        statusText:
          type: string
        href:
          type: string
        webUrl:
          type: string

    BuildType:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        projectId:
          type: string
        projectName:
          type: string
        href:
          type: string
        webUrl:
          type: string
        paused:
          type: boolean

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        parentProjectId:
          type: string
        href:
          type: string
        webUrl:
          type: string

    BuildQueueItem:
      type: object
      properties:
        id:
          type: string
        buildTypeId:
          type: string
        state:
          type: string
        href:
          type: string
        webUrl:
          type: string

    BuildCancelRequest:
      type: object
      properties:
        comment:
          type: string
        readdIntoQueue:
          type: boolean

    RunBuildRequest:
      type: object
      properties:
        buildTypeId:
          type: string
        branchName:
          type: string
        cleanSources:
          type: boolean
        parameters:
          type: object
          additionalProperties:
            type: string