# TeamCity model comparison rules
# Format: RequestClass=ResponseClass:requestField=responseField,...
# Ignore: ClassName.ignore=field1,field2

Project=Project:name=name,description=description,parentProjectId=parentProjectId
Project.ignore=id,href,webUrl,password

BuildConfig=BuildConfig:name=name,projectId=projectId,description=description
BuildConfig.ignore=id,href,webUrl,paused

User=User:username=username,email=email,name=name
User.ignore=id,href,password,lastLogin,hasPassword,roles,groups,properties,avatars,enabled2FA,realm,locator
