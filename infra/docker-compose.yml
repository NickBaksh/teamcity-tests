version: '3.8'

services:
  # ============================================
  # 1. PostgreSQL - база данных для NBank
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: nbank-postgres
    ports:
      - "5433:5432"  # Пробрасываем на хост (чтобы не конфликтовать)
    environment:
      POSTGRES_DB: nbank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nbank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nbank"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # 2. NBank Backend - основной сервис для тестирования
  # ============================================
  backend:
    image: nobugsme/nbank:with_database_with_fix
    container_name: nbank-backend
    ports:
      - "4111:4111"  # API бэкенда
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nbank
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SERVER_PORT: 4111
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nbank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4111/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # 3. Selenoid - браузеры для UI тестов
  # ============================================
  selenoid:
    image: aerokube/selenoid:latest
    container_name: selenoid
    ports:
      - "4444:4444"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./selenoid/config:/etc/selenoid
      - ./selenoid/video:/opt/selenoid/video
      - ./selenoid/logs:/opt/selenoid/logs
    environment:
      - TZ=Europe/Moscow
    command:
      - -conf
      - /etc/selenoid/browsers.json
      - -video-output-dir
      - /opt/selenoid/video
      - -log-output-dir
      - /opt/selenoid/logs
      - -container-network
      - nbank-network
    networks:
      - nbank-network
    restart: unless-stopped

  # ============================================
  # 4. Selenoid UI - просмотр сессий браузеров
  # ============================================
  selenoid-ui:
    image: aerokube/selenoid-ui:latest
    container_name: selenoid-ui
    ports:
      - "8080:8080"
    links:
      - selenoid
    command: --selenoid-uri http://selenoid:4444
    networks:
      - nbank-network
    restart: unless-stopped

  # ============================================
  # 5. TeamCity Server
  # ============================================
  teamcity-server:
    image: jetbrains/teamcity-server:2026.1.1
    container_name: teamcity-server
    ports:
      - "8111:8111"
    volumes:
      - ./teamcity-server/data:/data/teamcity_server/datadir
      - ./teamcity-server/logs:/opt/teamcity/logs
    environment:
      - TEAMCITY_SERVER_MEM_OPTS=-Xmx2g -XX:ReservedCodeCacheSize=512m
    networks:
      - nbank-network
    restart: unless-stopped

  # ============================================
  # 6. TeamCity Agent
  # ============================================
  teamcity-agent:
    image: jetbrains/teamcity-agent:2026.1.1-linux-sudo
    container_name: teamcity-agent
    depends_on:
      - teamcity-server
    volumes:
      - ./teamcity-agent/conf:/data/teamcity_agent/conf
      - /var/run/docker.sock:/var/run/docker.sock
      - ./teamcity-agent/work:/opt/teamcity-agent/work
      - ./allure-results:/opt/allure-results
    environment:
      - SERVER_URL=http://teamcity-server:8111
      - AGENT_NAME=nbank-agent
      - DOCKER_IN_DOCKER=start
    networks:
      - nbank-network
    restart: unless-stopped
    user: root
    privileged: true

  # ============================================
  # 7. Allure Server - просмотр отчетов
  # ============================================
  allure:
    image: frankescobar/allure-docker-service:latest
    container_name: allure-server
    ports:
      - "5050:5050"
    environment:
      - CHECK_RESULTS_EVERY_SECONDS=3
      - KEEP_HISTORY=1
    volumes:
      - ./allure-results:/app/allure-results
      - ./allure-reports-history:/app/default-reports
    networks:
      - nbank-network
    restart: unless-stopped

# ============================================
# Сети и тома
# ============================================
networks:
  nbank-network:
    name: nbank-network
    driver: bridge

volumes:
  postgres_data:
    driver: local
  allure-results:
    driver: local
  allure-reports-history:
    driver: local